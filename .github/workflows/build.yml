name: Build IPA
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: chmod +x node_modules/.bin/cap
      - run: npx cap sync ios
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Build IPA
        run: |
          cd ios/App
          xcodebuild -scheme App -configuration Release \
            -archivePath build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            archive
          mkdir -p build/output/Payload
          cp -r build/App.xcarchive/Products/Applications/App.app \
            build/output/Payload/
          cd build/output
          zip -r LeanUp.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: LeanUp-IPA
          path: ios/App/build/output/LeanUp.ipa